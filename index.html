<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ToDO -->
    <script src="script.js"></script>

    <div class="header"> Movie Explorer</div>

    <div class="search-engine">
        <div>
            <input type="text" placeholder="Search for a movie...">
        </div>
        
        <div>
            <select label="sort by">
                <option>Sort By</option>
                <option>Release Date (Asc)</option>
                <option>Release Date (Desc)</option>
                <option>Rating (Asc)</option>
                <option>Rating (Desc)</option>
            </select>
        </div>
    </div>

    <main id="movie-display">
        <div class="movie-poster">
            <img src="image/image_1.jpg">

        </div>

        <div class="movie-poster">
            <img src="image/image_2.jpg">
            <div class="movie-info">
                <h3>captain america: brave new world</h3>
                <p>release date: 2024-10-01</p>
                <p>rating 10/10</p>
            </div>
        </div>

        <div class="movie-poster">
            <img src="image/image_3.jpg">
        </div>

        <div class="movie-poster">
            <img src="image/image_4.jpg">
        </div>

        <div class="movie-poster">
            <img src="image/cursor.jpg">
        </div>

    </main>

</body>
</html>
